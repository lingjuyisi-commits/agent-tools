name: Release Server (agent-tools-server)

on:
  push:
    tags:
      - 'server-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml
      - run: pnpm install --ignore-scripts
        working-directory: server
      - run: pnpm rebuild better-sqlite3
        working-directory: server
      - name: Smoke test - module loading
        working-directory: server
        run: |
          node -e "require('./src/config'); require('./src/db'); require('./src/app'); console.log('All modules OK')"
      - name: Smoke test - migration dry-run
        working-directory: server
        run: |
          node -e "
            const { createDb } = require('./src/db');
            const os = require('os');
            const path = require('path');
            const db = createDb({ database: { client: 'better-sqlite3', connection: { filename: path.join(os.tmpdir(), 'test-ci.db') }, useNullAsDefault: true }});
            db.migrate.latest({ directory: './migrations' })
              .then(() => { console.log('Migrations OK'); return db.destroy(); })
              .then(() => process.exit(0))
              .catch(e => { console.error(e); process.exit(1); });
          "

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install --ignore-scripts --omit=dev
        working-directory: server
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#server-v}" >> $GITHUB_OUTPUT
      - name: Update package version
        working-directory: server
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Pack tarball
        working-directory: server
        run: npm pack
      - name: Rename tarball
        working-directory: server
        run: mv *.tgz agent-tools-server-${{ steps.version.outputs.version }}.tgz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Server v${{ steps.version.outputs.version }}
          files: server/agent-tools-server-${{ steps.version.outputs.version }}.tgz
          body: |
            ## agent-tools Server v${{ steps.version.outputs.version }}

            ### 安装方式
            ```bash
            # 下载 tgz 后本地安装
            npm install -g agent-tools-server-${{ steps.version.outputs.version }}.tgz
            ```
          generate_release_notes: true
