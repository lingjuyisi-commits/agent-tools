name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test-cli:
    name: Test CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: pnpm install --ignore-scripts
        working-directory: cli
      - run: pnpm rebuild better-sqlite3
        working-directory: cli
      - name: Test modules load
        working-directory: cli
        run: node -e "require('./src/utils/config'); require('./src/detector'); require('./src/collector/local-store'); console.log('CLI modules OK')"
      - name: Test CLI help
        working-directory: cli
        run: node bin/cli.js --help

  test-server:
    name: Test Server
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml
      - run: pnpm install --ignore-scripts
        working-directory: server
      - run: pnpm rebuild better-sqlite3
        working-directory: server
      - name: Test modules load
        working-directory: server
        run: node -e "require('./src/config'); require('./src/db'); require('./src/app'); console.log('Server modules OK')"
      - name: Test migrations (SQLite)
        working-directory: server
        run: |
          node -e "
            const { createDb } = require('./src/db');
            const os = require('os');
            const path = require('path');
            const db = createDb({ database: { client: 'better-sqlite3', connection: { filename: path.join(os.tmpdir(), 'test-ci.db') }, useNullAsDefault: true }});
            db.migrate.latest({ directory: './migrations' })
              .then(() => { console.log('Migrations OK'); return db.destroy(); })
              .then(() => process.exit(0))
              .catch(e => { console.error(e); process.exit(1); });
          "

  release:
    name: Release
    needs: [test-cli, test-server]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── CLI ──
      - run: npm install --ignore-scripts --omit=dev
        working-directory: cli
      - name: Set CLI version
        working-directory: cli
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack CLI
        working-directory: cli
        run: npm pack
      - name: Rename CLI tarball
        working-directory: cli
        run: mv *.tgz agent-tools-cli-${{ steps.version.outputs.version }}.tgz

      # ── Server ──
      - run: npm install --ignore-scripts --omit=dev
        working-directory: server
      - name: Set Server version
        working-directory: server
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack Server
        working-directory: server
        run: npm pack
      - name: Rename Server tarball
        working-directory: server
        run: mv *.tgz agent-tools-server-${{ steps.version.outputs.version }}.tgz

      # ── Create Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            cli/agent-tools-cli-${{ steps.version.outputs.version }}.tgz
            server/agent-tools-server-${{ steps.version.outputs.version }}.tgz
          body: |
            ## agent-tools v${{ steps.version.outputs.version }}

            ### 安装方式
            ```bash
            # 下载 tgz 后本地安装
            npm install -g agent-tools-cli-${{ steps.version.outputs.version }}.tgz
            npm install -g agent-tools-server-${{ steps.version.outputs.version }}.tgz
            ```
          generate_release_notes: true
