name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test-cli:
    name: Test CLI
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
        working-directory: cli
      - name: Test modules load
        working-directory: cli
        run: node -e "require('./src/utils/config'); require('./src/detector'); require('./src/collector/local-store'); console.log('CLI modules OK')"
      - name: Test CLI help
        working-directory: cli
        run: node bin/cli.js --help

  test-server:
    name: Test Server
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
        working-directory: server
      - name: Test modules load
        working-directory: server
        run: node -e "require('./src/config'); require('./src/db'); require('./src/app'); console.log('Server modules OK')"
      - name: Test migrations (SQLite)
        working-directory: server
        run: |
          node -e "
            const { createDb } = require('./src/db');
            const os = require('os');
            const path = require('path');
            const db = createDb({ database: { client: 'better-sqlite3', connection: { filename: path.join(os.tmpdir(), 'test-ci.db') }, useNullAsDefault: true }});
            db.migrate.latest({ directory: './migrations' })
              .then(() => { console.log('Migrations OK'); return db.destroy(); })
              .then(() => process.exit(0))
              .catch(e => { console.error(e); process.exit(1); });
          "

  release:
    name: Release
    needs: [test-cli, test-server]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── CLI (minimal) ──
      - run: npm install --ignore-scripts --omit=dev
        working-directory: cli
      - name: Set CLI version
        working-directory: cli
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack CLI
        working-directory: cli
        run: npm pack
      - name: Rename CLI tarball
        working-directory: cli
        run: |
          for f in *.tgz; do
            target="agent-tools-cli-${{ steps.version.outputs.version }}.tgz"
            [ "$f" = "$target" ] || mv "$f" "$target"
          done

      # ── Embed CLI tgz in Server + generate version manifest ──
      - name: Embed CLI tgz in server
        run: |
          mkdir -p server/dist
          cp cli/agent-tools-cli-${{ steps.version.outputs.version }}.tgz server/dist/agent-tools-cli.tgz

      # ── Server (minimal) ──
      - run: npm install --ignore-scripts --omit=dev
        working-directory: server
      - name: Set Server version
        working-directory: server
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack Server
        working-directory: server
        run: npm pack
      - name: Rename Server tarball
        working-directory: server
        run: |
          for f in *.tgz; do
            target="agent-tools-server-${{ steps.version.outputs.version }}.tgz"
            [ "$f" = "$target" ] || mv "$f" "$target"
          done

      # ── Create Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          files: |
            cli/agent-tools-cli-${{ steps.version.outputs.version }}.tgz
            server/agent-tools-server-${{ steps.version.outputs.version }}.tgz
          body: |
            ## agent-tools v${{ steps.version.outputs.version }}

            ### 安装方式（需联网下载依赖）
            ```bash
            npm install -g agent-tools-cli-${{ steps.version.outputs.version }}.tgz
            npm install -g agent-tools-server-${{ steps.version.outputs.version }}.tgz
            ```

            ### 离线安装（包含所有依赖，按平台选择）
            ```bash
            npm install -g agent-tools-cli-full-linux-${{ steps.version.outputs.version }}.tgz
            npm install -g agent-tools-server-full-linux-${{ steps.version.outputs.version }}.tgz
            ```
            平台后缀：`linux` / `darwin` / `win32`
          generate_release_notes: true

  release-full:
    name: Release Full (${{ matrix.platform }})
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: darwin
          - os: windows-latest
            platform: win32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      # ── CLI full ──
      - run: npm install --omit=dev
        working-directory: cli
      - name: Set CLI version
        working-directory: cli
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack CLI full
        working-directory: cli
        run: |
          node -e "const p=require('./package.json'); p.bundleDependencies=true; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm pack
        shell: bash
      - name: Rename CLI full tarball
        working-directory: cli
        run: |
          for f in *.tgz; do
            target="agent-tools-cli-full-${{ matrix.platform }}-${{ steps.version.outputs.version }}.tgz"
            [ "$f" = "$target" ] || mv "$f" "$target"
          done
        shell: bash

      # ── Embed CLI tgz in Server + generate version manifest ──
      - name: Embed CLI tgz in server
        run: |
          mkdir -p server/dist
          cp cli/agent-tools-cli-full-${{ matrix.platform }}-${{ steps.version.outputs.version }}.tgz server/dist/agent-tools-cli.tgz
        shell: bash

      # ── Server full ──
      - run: npm install --omit=dev
        working-directory: server
      - name: Set Server version
        working-directory: server
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version
      - name: Pack Server full
        working-directory: server
        run: |
          node -e "const p=require('./package.json'); p.bundleDependencies=true; require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');"
          npm pack
        shell: bash
      - name: Rename Server full tarball
        working-directory: server
        run: |
          for f in *.tgz; do
            target="agent-tools-server-full-${{ matrix.platform }}-${{ steps.version.outputs.version }}.tgz"
            [ "$f" = "$target" ] || mv "$f" "$target"
          done
        shell: bash

      # ── Upload to existing Release ──
      - name: Upload full packages to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            cli/agent-tools-cli-full-${{ matrix.platform }}-${{ steps.version.outputs.version }}.tgz
            server/agent-tools-server-full-${{ matrix.platform }}-${{ steps.version.outputs.version }}.tgz
