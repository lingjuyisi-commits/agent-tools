name: Release CLI (agent-tools)

on:
  push:
    tags:
      - 'cli-v*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'
          cache-dependency-path: cli/pnpm-lock.yaml
      - run: pnpm install --ignore-scripts
        working-directory: cli
      - run: pnpm rebuild better-sqlite3
        working-directory: cli
      - name: Smoke test - module loading
        working-directory: cli
        run: |
          node -e "require('./src/utils/config'); require('./src/detector'); require('./src/collector/local-store'); require('./src/collector/uploader'); require('./src/collector/event-normalizer'); require('./src/hooks/adapters/claude-code'); require('./src/hooks/adapters/codebuddy'); console.log('All modules OK')"
      - name: Smoke test - CLI help
        working-directory: cli
        run: node bin/cli.js --help

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install --ignore-scripts --omit=dev
        working-directory: cli
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli-v}" >> $GITHUB_OUTPUT
      - name: Update package version
        working-directory: cli
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Pack tarball
        working-directory: cli
        run: npm pack
      - name: Rename tarball
        working-directory: cli
        run: mv *.tgz agent-tools-cli-${{ steps.version.outputs.version }}.tgz
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CLI v${{ steps.version.outputs.version }}
          files: cli/agent-tools-cli-${{ steps.version.outputs.version }}.tgz
          body: |
            ## agent-tools CLI v${{ steps.version.outputs.version }}

            ### 安装方式
            ```bash
            # 下载 tgz 后本地安装
            npm install -g agent-tools-cli-${{ steps.version.outputs.version }}.tgz
            ```
          generate_release_notes: true
